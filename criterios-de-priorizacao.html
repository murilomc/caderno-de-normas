<script>
  var weights = {
    "Selecione": 0,  // Assume que "Selecione" é o valor inicial que não agrega peso
    "Prescrito": 0,
    "Prescreve em mais de 2 anos": 1,
    "Prescreve entre 181 dias e 2 anos": 2,
    "Prescreve entre 91 e 180 dias": 4,
    "Prescreve em até 90 dias": 6,
    "Externa": 1,
    "Interna": 3,
    "Gravidade baixa": 1,
    "Gravidade média": 3,
    "Gravidade alta": 5,
    "Origem": {
      "Externa": 1,
      "Interna": 2
    },
    "Agente público não ocupante de cargo": 0,
    "Agente público ocupante de FCPE de níveis 2 a 4": 1,
    "Agente público ocupante de FCPE de níveis 5 e acima": 2,
    "MEI, ME e EPP": 1,
    "Empresa medio porte": 3,
    "Empresa grande porte": 5,
    "Baixa": 1,
    "Média": 2,
    "Alta": 3
  };
  
  function updateWeight(selectElement) {
    var weightCell = selectElement.parentNode.nextElementSibling;
    var selectedValue = selectElement.value;
    weightCell.innerText = weights[selectedValue] !== undefined ? weights[selectedValue] : "Error";
    updateTotal();
  }
  
  function updateTotal() {
    var total = 0;
    var weightCells = document.querySelectorAll('table tbody tr td:last-child:not(#totalRow)');
    weightCells.forEach(function(weightCell) {
      total += parseInt(weightCell.innerText) || 0;
    });
    document.getElementById('totalRow').innerText = total;
  }
  
  function resetWeights() {
    document.querySelectorAll('table select').forEach(function(select) {
      select.selectedIndex = 0;
      updateWeight(select); // Update each row weight after reset
    });
    document.getElementById('totalRow').innerText = 0;
  }
  </script>

<div class="readable-text"><p>Os critérios de priorização serão classificados de acordo com as seguintes orientações:</p>
<ol><li><strong>Prazo Prescricional:</strong> Será considerada a data do conhecimento dos fatos pela autoridade competente 
  (<a href="https://www.planalto.gov.br/ccivil_03/leis/l8112cons.htm#art142§1" target="_blank">PAD</a>) ou pela ciência da infração pela autoridade competente (<a href="https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2013/lei/l12846.htm#art25" target="_blank">PAR</a>) e, no caso de infração permanente ou continuada, do dia em que tiver cessado, caso a cessação se dê em momento posterior à ciência pela referida autoridade.</li><strong>Observações:</strong> Para definição dos prazos prescricionais da pretensão punitiva em procedimento em desfavor de agente público ou privado serão consideradas a aplicabilidade das penas em perspectiva, considerando-se os fatos narrados no momento da análise para classificação do processo.Considerando que os prazos prescricionais dos processos acusatórios (PAD, Sindicância Acusatória e PAR) não se interrompem novamente após o primeiro ato de sua instauração, ser-lhes-á atribuída pontuação mais elevada e diferenciada dos demais processos.</li><li><strong>Gravidade da conduta do agente público:</strong> Será considerada de gravidade baixa aquela com penalidade, em tese, de advertência ou suspensão até 30 dias; de gravidade moderada aquela com penalidade, em tese, de suspensão acima de 30 dias e de gravidade alta aquela com penalidade, em tese, de demissão.</li><li><strong>Gravidade da conduta do ente privado:</strong> Serão considerados a tolerância ou ciência de pessoas do corpo diretivo ou gerencial da pessoa jurídica; a existência de indícios de pagamento de vantagem indevida a agente público; a ocorrência, em razão dos fatos apurados, de interrupção no fornecimento de serviço público ou na execução de obra contratada; e o valor dos contratos mantidos ou pretendidos, relacionados aos fatos em apuração.</li><li><strong>Cargo do agente público envolvido:</strong> Será considerado o cargo ao qual o agente público estiver vinculado no momento de ocorrência dos fatos, devendo-se considerar, no caso de mais de uma gente envolvido, a ocupação do cargo de maior hierarquia.</li><li><strong>Porte do ente privado envolvido:</strong> Serão considerados os dados cadastrais fiscais da empresa e, na falta de tais dados, nas demais informações disponíveis e na legislação em vigor, considerando-se a definição constante de seu cadastro ou atribuída pela legislação em vigor no momento da análise, para classificação do processo, devendo-se considerar, no caso de mais de um ente privado envolvido, aquele de maior porte.</li><li><strong>Repercussão dos fatos no âmbito da Administração Pública:</strong> Serão considerados o número de agentes públicos, de entes privados e de unidades administrativas envolvidos; o impacto à imagem institucional perante a sociedade; a veiculação dos fatos na mídia; a existência de indícios de grave dano ao erário; o impacto gerado em razão do alcance dimensional do local de ocorrência dos fatos (nacional > regional > local) e/ou estrutura hierárquica envolvida; a existência de inquérito policial para apuração dos fatos na seara criminal; e o grau de efetividade da eventual penalidade a ser aplicada.</li></ol></div>

<script id="modern-top-script">(()=>{const t=document.querySelector('.modern-menu-toggle'),m=document.getElementById('modern-primary-menu'),bs=[...document.querySelectorAll('.modern-dropdown-btn')];function c(){document.querySelectorAll('.modern-dropdown.is-open').forEach(d=>{d.classList.remove('is-open');d.querySelector('.modern-dropdown-btn')?.setAttribute('aria-expanded','false')})}function x(){if(!t||!m)return;m.classList.remove('is-open');t.setAttribute('aria-expanded','false');t.setAttribute('aria-label','Abrir menu de navegação');c()}if(t&&m){t.addEventListener('click',()=>{const o=m.classList.toggle('is-open');t.setAttribute('aria-expanded',String(o));t.setAttribute('aria-label',o?'Fechar menu de navegação':'Abrir menu de navegação')});m.querySelectorAll('a').forEach(a=>a.addEventListener('click',x));window.addEventListener('resize',()=>{if(innerWidth>980)x()})}bs.forEach(b=>b.addEventListener('click',()=>{if(innerWidth>980)return;const d=b.closest('.modern-dropdown');if(!d)return;const o=!d.classList.contains('is-open');c();d.classList.toggle('is-open',o);b.setAttribute('aria-expanded',String(o))}));document.addEventListener('click',e=>{if(innerWidth<=980&&m&&!m.contains(e.target)&&!e.target.closest('.modern-menu-toggle'))x()})})();</script>
